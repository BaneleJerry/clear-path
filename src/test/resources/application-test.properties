# Force PostgreSQL dialect to stop Hibernate from using MySQL-style 'enum' DDL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Fix the 'PgConnection.createClob() is not yet implemented' error
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Ensure Hibernate cleans up the schema after tests
spring.jpa.hibernate.ddl-auto=create-drop

# Reduce logging for Hikari during tests
logging.level.com.zaxxer.hikari=ERROR

# Reduce logging for the Testcontainers reaper (Ryuk)
logging.level.org.testcontainers=INFO