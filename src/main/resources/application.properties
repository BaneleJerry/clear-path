spring.application.name=clear-path

# --- Database Connection (Docker Compose / Postgres) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate Settings ---
# Use the modern Postgres Dialect for Hibernate 6
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Clean Up ---
# Disable H2 console as it is not used for Postgres
spring.h2.console.enabled=false

# --- Auditing & View Management ---
# Highly recommended: Disable OSIV to prevent performance issues in the future
spring.jpa.open-in-view=false

# Expose actuator endpoints with CORS
management.endpoints.web.cors.allowed-origins=http://localhost:5173
management.endpoints.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS